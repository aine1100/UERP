spring.application.name=national-utility-billing-system

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/utility
spring.datasource.username=postgres
spring.datasource.password=aine
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Mail (Google SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=ainedushimire@gmail.com
spring.mail.password=rgwi ubxa iyps cwuw
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Server
server.port=8080
server.servlet.context-path=/

# JWT & App
app.jwt.secret=${JWT_SECRET:YourSuperSecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLong!!}
app.jwt.access-token-expiration-ms=900000
app.jwt.refresh-token-expiration-ms=604800000

app.invite.token-expiration-hours=48
app.reset.token-expiration-hours=2

app.admin.email=${ADMIN_EMAIL:ainedushimire@gmail.com}
app.admin.full-names=${ADMIN_FULL_NAMES:System Administrator}
app.admin.phone=${ADMIN_PHONE:0780000000}
app.admin.password=${ADMIN_PASSWORD:Admin@12345}

# Rwanda locations (classpath or file path)
app.locations.file=${LOCATIONS_FILE:classpath:locations.json}
app.locations.swagger-village-enum-limit=8000

# Swagger / OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha

# Logging
logging.level.com.national.utility.billing=INFO
logging.level.org.springframework.security=WARN
